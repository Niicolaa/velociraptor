name: Generic.Detection.SecretScanner
description: |
  Filesystem secret scanner built on top of TruffleHog.

  Wraps the TruffleHog binary (released by Truffle Security on
  GitHub) for cross-platform filesystem scanning of API keys,
  credentials, tokens, private keys, and similar high-value strings.
  The artifact downloads the OS-appropriate binary via
  `Generic.Utils.FetchBinary`, runs `trufflehog filesystem` with
  `--json`, and parses the JSONL output into Velociraptor rows.

  Default mode is `Verify=false` (the binary is invoked with
  `--no-verification`). Verification means TruffleHog actively probes
  the corresponding cloud / SaaS API (AWS, Slack, GitHub, ...) for
  each candidate secret to confirm it is live. That is powerful but:

    1. produces *outbound* traffic from the compromised host,
    2. can trip abuse-detection at the cloud provider, and
    3. is rarely appropriate during an incident.

  Set `Verify=true` only when you have positively confirmed the
  outbound traffic is acceptable for this host and this incident.

author: "Claude - credential-compromise-detection"

reference:
  - https://github.com/trufflesecurity/trufflehog
  - https://attack.mitre.org/techniques/T1552/001/

tools:
  - name: TruffleHogWindows
    url: https://github.com/trufflesecurity/trufflehog/releases/download/v3.82.13/trufflehog_3.82.13_windows_amd64.tar.gz
    serve_locally: true
  - name: TruffleHogLinux
    url: https://github.com/trufflesecurity/trufflehog/releases/download/v3.82.13/trufflehog_3.82.13_linux_amd64.tar.gz
    serve_locally: true
  - name: TruffleHogMacOS
    url: https://github.com/trufflesecurity/trufflehog/releases/download/v3.82.13/trufflehog_3.82.13_darwin_amd64.tar.gz
    serve_locally: true

parameters:
  - name: ScanPaths
    description: |
      Comma-separated paths to scan. If empty, OS defaults are used:
        Windows: C:/Users
        Linux:   /home,/root,/etc,/var/www,/opt
        macOS:   /Users
    default: ''
  - name: Verify
    type: bool
    description: |
      If true, TruffleHog will verify each candidate secret by
      contacting the relevant API. Default false (--no-verification).
      Producing outbound traffic from a compromised host is rarely
      desirable - keep this off unless you are sure.
  - name: IncludePathsRegex
    type: regex
    default: '.+'
    description: Post-filter - only return findings whose source path matches.
  - name: ExcludePathsRegex
    type: regex
    default: ''
    description: Post-filter - drop findings whose source path matches.
  - name: Concurrency
    type: int64
    default: 8
    description: TruffleHog --concurrency flag.
  - name: ArchiveMaxDepth
    type: int64
    default: 5
    description: TruffleHog --archive-max-depth flag (depth into nested archives).

implied_permissions:
  - EXECVE
  - FILESYSTEM_WRITE

sources:
  - name: Findings
    query: |
      LET host_os <= SELECT OS FROM info()
      LET tool_name <= if(condition=host_os[0].OS = 'windows', then='TruffleHogWindows',
                      else=if(condition=host_os[0].OS = 'linux', then='TruffleHogLinux',
                      else=if(condition=host_os[0].OS = 'darwin', then='TruffleHogMacOS',
                      else='')))

      LET default_paths <= if(condition=host_os[0].OS = 'windows', then='C:/Users',
                          else=if(condition=host_os[0].OS = 'linux', then='/home,/root,/etc,/var/www,/opt',
                          else=if(condition=host_os[0].OS = 'darwin', then='/Users',
                          else='')))

      LET effective_paths <= if(condition=ScanPaths,
            then=ScanPaths, else=default_paths)
      LET path_list <= split(string=effective_paths, sep=",")

      -- TruffleHog GitHub releases are .tar.gz archives - we fetch
      -- the archive (IsExecutable='N'), extract it into a tempdir,
      -- then exec the resulting `trufflehog` binary.
      LET archive = SELECT OSPath AS ArchivePath
        FROM Artifact.Generic.Utils.FetchBinary(
          ToolName=tool_name, IsExecutable='N')

      LET workdir <= tempdir()

      LET extract <= SELECT * FROM foreach(row=archive, query={
        SELECT ReturnCode AS ExtractRC,
               Stderr AS ExtractStderr,
               workdir AS WorkDir
        FROM execve(argv=["tar", "-xzf", ArchivePath, "-C", workdir],
                    length=10000)
      })

      LET bin_name = if(condition=host_os[0].OS = 'windows',
                        then='trufflehog.exe',
                        else='trufflehog')

      LET bin_query <= SELECT OSPath AS P FROM glob(
        globs=workdir + "/" + bin_name)
        WHERE extract
      LET bin_path <= bin_query[0].P

      LET argv_factory(path) = if(condition=Verify,
        then=[bin_path, "filesystem", path,
              "--json",
              "--concurrency=" + str(str=Concurrency),
              "--archive-max-depth=" + str(str=ArchiveMaxDepth)],
        else=[bin_path, "filesystem", path,
              "--json",
              "--no-verification",
              "--concurrency=" + str(str=Concurrency),
              "--archive-max-depth=" + str(str=ArchiveMaxDepth)])

      LET scans = SELECT * FROM foreach(row=path_list, query={
        SELECT Stdout, Stderr, ReturnCode, _value AS ScannedPath FROM execve(
          argv=argv_factory(path=_value),
          length=200000000)
      })

      SELECT * FROM foreach(row=scans, query={
        SELECT
          get(field="DetectorName") AS DetectorName,
          get(field="DecoderName") AS DecoderName,
          get(field="Verified") AS Verified,
          get(field="Redacted") AS Redacted,
          get(field="Raw") AS Raw,
          get(field="RawV2") AS RawV2,
          get(field="ExtraData") AS ExtraData,
          get(field="SourceMetadata").Data.Filesystem.file AS File,
          get(field="SourceMetadata").Data.Filesystem.line AS Line,
          ScannedPath
        FROM parse_jsonl(filename=Stdout, accessor='data')
        WHERE File =~ IncludePathsRegex
          AND if(condition=ExcludePathsRegex,
                 then=NOT File =~ ExcludePathsRegex,
                 else=TRUE)
      })
