name: Generic.Applications.Chromium.LocalStorage
description: |
  Chromium based browsers (Chrome, Edge, Brave) and Electron
  applications (Slack, Discord, Teams, Signal, Notion, ...) store HTML5
  Local Storage in a LevelDB database located in the `Local
  Storage/leveldb` directory of each profile.

  Local Storage allows a web origin to persist key/value data in the
  browser. This artifact parses the LevelDB database and decodes the
  per-origin key/value pairs.

  Each record is keyed by `_<origin>\0<key>` and the value (as well as
  the key) is prefixed with a single byte indicating the text encoding
  (`0` = UTF-16, `1` = Latin-1).

  By default this artifact searches the well known browser profile
  locations as well as the per-application Electron storage
  directories. Add additional globs in the `LocalStorageGlobs`
  parameter as required.

precondition: SELECT OS From info() where OS = 'windows' OR OS = 'linux' OR OS = 'darwin'

parameters:
- name: LocalStorageGlobs
  type: csv
  default: |
    Glob
    C:/Users/*/AppData/Local/Google/Chrome/User Data/*/Local Storage/leveldb
    C:/Users/*/AppData/Local/Microsoft/Edge/User Data/*/Local Storage/leveldb
    C:/Users/*/AppData/Local/BraveSoftware/Brave-Browser/User Data/*/Local Storage/leveldb
    C:/Users/*/AppData/Roaming/*/Local Storage/leveldb
    C:/Users/*/AppData/Roaming/*/*/Local Storage/leveldb
    /home/*/.config/google-chrome/*/Local Storage/leveldb
    /home/*/.config/microsoft-edge/*/Local Storage/leveldb
    /home/*/.config/BraveSoftware/Brave-Browser/*/Local Storage/leveldb
    /home/*/.config/*/Local Storage/leveldb
    /Users/*/Library/Application Support/Google/Chrome/*/Local Storage/leveldb
    /Users/*/Library/Application Support/Microsoft Edge/*/Local Storage/leveldb
    /Users/*/Library/Application Support/*/Local Storage/leveldb

- name: KeyFilter
  description: A regex applied to the decoded key to filter results.
  default: .
  type: regex

- name: Accessor
  default: auto

- name: AlsoUpload
  type: bool
  description: If selected we also upload the Local Storage directory.

sources:
- query: |
    -- Strip the one byte encoding prefix and decode the string. A
    -- leading 0 byte means the remainder is UTF-16, otherwise Latin-1.
    LET DecodeStr(X) = if(condition=len(list=X) = 0,
       then="",
       else=if(condition=X[0] = 0,
          then=utf16(string=X[1:]),
          else=X[1:]))

    LET Records(OSPath) = SELECT * FROM foreach(row={
       SELECT Key AS RawKey, Value AS RawValue
       FROM leveldb(file=OSPath, accessor=Accessor)
       -- Data records are keyed with a leading underscore. META: /
       -- VERSION / map-id keys are skipped.
       WHERE RawKey =~ "^_"
    }, query={
       SELECT parse_string_with_regex(string=RawKey,
                regex='''(?s)^_(?P<Origin>[^\x00]+)\x00(?P<Key>.*)$''') AS Parsed,
              RawKey, RawValue
       FROM scope()
    })

    LET hits = SELECT OSPath FROM glob(globs=LocalStorageGlobs.Glob, accessor=Accessor)
               WHERE log(message="Processing %v", args=OSPath)

    SELECT * FROM foreach(row=hits, query={
       SELECT OSPath,
              Parsed.Origin AS Origin,
              DecodeStr(X=Parsed.Key) AS Key,
              DecodeStr(X=RawValue) AS Value,
              if(condition=AlsoUpload, then=upload(file=OSPath, accessor=Accessor)) AS Upload
       FROM Records(OSPath=OSPath)
       WHERE Key =~ KeyFilter
    })
