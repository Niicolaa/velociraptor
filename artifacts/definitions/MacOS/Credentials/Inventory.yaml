name: MacOS.Credentials.Inventory
description: |
  Enumerates credential stores present on a macOS host so an incident
  responder can size the credential-compromise blast radius.

  Default mode: count + locate, no plaintext extraction.

  Sources covered:

    - Login / System / iCloud keychains  (presence + mtime only)
    - SSH keys                            (~/.ssh)
    - Cloud CLI credentials               (.aws, .azure, gcloud,
                                            kubeconfig, docker)
    - Git credentials + .netrc
    - Browser login databases             (Chrome / Safari / Firefox)
    - Wi-Fi SSIDs                          (airport -I / -s),
                                            PSK extraction only with
                                            `Extract=true` via `security
                                            find-generic-password -ga`
                                            (will prompt a system dialog
                                            unless the SecurityAgent ACL
                                            has been granted)

  Note: macOS does not have an open-source LaZagne build of comparable
  coverage, so this artifact is native-only. Hooks for tool-based
  augmentation are left out by design.

author: "Claude - credential-compromise-detection"

precondition: SELECT OS From info() where OS = 'darwin'

parameters:
  - name: Extract
    type: bool
  - name: Upload
    type: bool
    description: |
      If true, upload each located credential file into the collection
      so a responder can inspect them. Especially useful for
      ~/.ssh/known_hosts (lateral-pivot graph) and keychain files
      (for offline keychain-cracker analysis).
  - name: HomeGlob
    default: '/Users/*'

sources:
  - name: Keychains
    query: |
      SELECT * FROM foreach(row=[
        dict(Kind='LoginKeychain',
             Glob=HomeGlob + '/Library/Keychains/login.keychain-db'),
        dict(Kind='LoginKeychain',
             Glob=HomeGlob + '/Library/Keychains/login.keychain'),
        dict(Kind='SystemKeychain',
             Glob='/Library/Keychains/System.keychain'),
        dict(Kind='ICloudKeychain',
             Glob=HomeGlob + '/Library/Keychains/*-*-*-*-*/keychain-2.db')
      ], query={
        SELECT Kind AS CredentialType,
               "Keychain" AS Source,
               OSPath AS Location,
               regex_replace(source=str(str=OSPath),
                             re='/Users/([^/]+)/.*',
                             replace='$1') AS User,
               dict(Size=Size, Mtime=Mtime) AS MetaData,
               false AS PlaintextAvailable,
               if(condition=Upload, then=upload(file=OSPath)) AS UploadInfo
        FROM glob(globs=Glob)
        WHERE NOT IsDir
      })

  - name: SSHKeys
    query: |
      SELECT "SSHKey" AS CredentialType,
             "OpenSSH" AS Source,
             OSPath AS Location,
             regex_replace(source=str(str=OSPath),
                           re='/Users/([^/]+)/.*',
                           replace='$1') AS User,
             dict(Size=Size, Mtime=Mtime,
                  Encrypted=read_file(filename=OSPath, length=200) =~ 'ENCRYPTED') AS MetaData,
             true AS PlaintextAvailable,
             if(condition=Upload, then=upload(file=OSPath)) AS UploadInfo
      FROM glob(globs=HomeGlob + '/.ssh/{id_rsa,id_dsa,id_ecdsa,id_ed25519,*.pem,*.key,authorized_keys,known_hosts}')
      WHERE NOT IsDir

  - name: CloudCLICredentials
    query: |
      LET globs = (
        dict(Kind='AWSCLI',     Glob=HomeGlob + '/.aws/credentials'),
        dict(Kind='AWSConfig',  Glob=HomeGlob + '/.aws/config'),
        dict(Kind='AzureCLI',   Glob=HomeGlob + '/.azure/accessTokens.json'),
        dict(Kind='AzureCLI',   Glob=HomeGlob + '/.azure/msal_token_cache.json'),
        dict(Kind='GCloud',     Glob=HomeGlob + '/.config/gcloud/credentials.db'),
        dict(Kind='Kubeconfig', Glob=HomeGlob + '/.kube/config'),
        dict(Kind='Docker',     Glob=HomeGlob + '/.docker/config.json')
      )
      SELECT * FROM foreach(row=globs, query={
        SELECT Kind AS CredentialType,
               "CloudCLI" AS Source,
               OSPath AS Location,
               regex_replace(source=str(str=OSPath),
                             re='/Users/([^/]+)/.*',
                             replace='$1') AS User,
               dict(Size=Size, Mtime=Mtime) AS MetaData,
               true AS PlaintextAvailable,
               if(condition=Upload, then=upload(file=OSPath)) AS UploadInfo
        FROM glob(globs=Glob)
        WHERE NOT IsDir
      })

  - name: GitAndNetrc
    query: |
      SELECT * FROM foreach(row=[
        dict(Kind='GitCredentials', Glob=HomeGlob + '/.git-credentials'),
        dict(Kind='Gitconfig',      Glob=HomeGlob + '/.gitconfig'),
        dict(Kind='Netrc',          Glob=HomeGlob + '/.netrc')
      ], query={
        SELECT Kind AS CredentialType,
               "GitAndNetrc" AS Source,
               OSPath AS Location,
               regex_replace(source=str(str=OSPath),
                             re='/Users/([^/]+)/.*',
                             replace='$1') AS User,
               dict(Size=Size, Mtime=Mtime) AS MetaData,
               true AS PlaintextAvailable,
               if(condition=Upload, then=upload(file=OSPath)) AS UploadInfo
        FROM glob(globs=Glob)
        WHERE NOT IsDir
      })

  - name: BrowserLogins
    query: |
      LET globs = (
        dict(Browser='Chrome',
             Glob=HomeGlob + '/Library/Application Support/Google/Chrome/*/Login Data'),
        dict(Browser='Edge',
             Glob=HomeGlob + '/Library/Application Support/Microsoft Edge/*/Login Data'),
        dict(Browser='Firefox',
             Glob=HomeGlob + '/Library/Application Support/Firefox/Profiles/*/logins.json'),
        dict(Browser='Safari',
             Glob=HomeGlob + '/Library/Safari/Form Values')
      )

      LET found = SELECT * FROM foreach(row=globs, query={
        SELECT Browser, OSPath, Mtime
        FROM glob(globs=Glob)
      })

      SELECT "BrowserLogin" AS CredentialType,
             Browser AS Source,
             OSPath AS Location,
             regex_replace(source=str(str=OSPath),
                           re='/Users/([^/]+)/.*',
                           replace='$1') AS User,
             dict(Mtime=Mtime) AS MetaData,
             Extract AS PlaintextAvailable,
             if(condition=Upload, then=upload(file=OSPath)) AS UploadInfo
      FROM found

  - name: WifiSSIDs
    query: |
      LET preferred = SELECT Stdout
        FROM execve(argv=[
          "/usr/sbin/networksetup", "-listpreferredwirelessnetworks", "en0"])

      SELECT "WifiSSID" AS CredentialType,
             "networksetup" AS Source,
             Line AS Location,
             NULL AS User,
             dict(SSID=Line) AS MetaData,
             Extract AS PlaintextAvailable
      FROM foreach(row=preferred, query={
        SELECT * FROM parse_lines(accessor='data', filename=Stdout)
        WHERE Line AND NOT Line =~ 'Preferred networks'
      })
