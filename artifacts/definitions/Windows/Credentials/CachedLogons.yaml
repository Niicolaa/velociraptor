name: Windows.Credentials.CachedLogons
description: |
  Reports the cached-domain-credentials posture of a Windows host.

  Cached domain credentials are MSCacheV2 verifiers that Windows keeps
  in `HKLM\SECURITY\Cache` so that a domain user can still log on to
  the workstation when the domain controller is unreachable. The
  number of distinct users whose verifier is cached is capped by the
  registry value
  `HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon\CachedLogonsCount`.

  Defaults (Microsoft):
    - Workstation: 10
    - Server:       1
    - 0 disables caching entirely

  MSCacheV2 hashes are GPU-crackable. After a host is compromised by
  an attacker with SYSTEM the cache file can be extracted (e.g. via
  `reg save HKLM\SECURITY` plus offline parsing) and every cached
  user's password becomes recoverable at hashcat speed. This artifact
  therefore reports both the configured max and a best-effort actual
  count.

  The actual verifier entries live under `HKLM\SECURITY\Cache\NL$*`
  and are not readable through the Windows registry API even as
  SYSTEM - they require either the raw_reg accessor against the
  SECURITY hive or a parsing of `C:\Windows\System32\config\SECURITY`.
  We use the raw_reg accessor when available; the hive file presence
  and size are always reported.

author: "Claude - credential-compromise-detection"

reference:
  - https://learn.microsoft.com/en-us/troubleshoot/windows-server/user-profiles-and-logon/cached-domain-logon-information
  - https://attack.mitre.org/techniques/T1003/005/

precondition: SELECT OS From info() where OS = 'windows'

parameters:
  - name: SecurityHivePath
    description: Path to the SECURITY hive (raw NTFS access via raw_reg accessor).
    default: C:/Windows/System32/config/SECURITY
  - name: SoftwareHivePath
    description: Path to the SOFTWARE hive (raw NTFS access via raw_reg accessor).
    default: C:/Windows/System32/config/SOFTWARE

sources:
  - name: CachedLogonsStatus
    query: |
      -- Live-registry read of the CachedLogonsCount value. Falls back
      -- to a raw_reg read of the SOFTWARE hive on hosts where the
      -- live registry is unreachable (offline triage, KAPE-like
      -- targets).
      LET live_value = read_reg_value(
            path="HKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon",
            value="CachedLogonsCount")

      LET hive_value = SELECT Data.value AS V
        FROM glob(
          globs="/Microsoft/Windows NT/CurrentVersion/Winlogon/CachedLogonsCount",
          root=pathspec(DelegatePath=SoftwareHivePath),
          accessor="raw_reg")

      LET configured = if(condition=live_value,
                           then=live_value,
                           else=hive_value[0].V)

      LET hive_info = SELECT OSPath, Size, Mtime
        FROM glob(globs=[SecurityHivePath])

      -- HKLM\SECURITY\Cache\NL$1 .. NL$N hold the MSCacheV2 verifier
      -- blobs. NL$Control is metadata. We count values whose name
      -- matches NL$<digits> to get the actual cached-user count.
      LET cache_entries = SELECT Name FROM glob(
            globs="/Cache/*",
            root=pathspec(DelegatePath=SecurityHivePath),
            accessor="raw_reg")
        WHERE Name =~ "^NL\\$\\d+$"

      SELECT
        str(str=configured) AS CachedLogonsCountRaw,
        if(condition=str(str=configured),
           then=atoi(string=str(str=configured)),
           else=10) AS ConfiguredMaxCachedLogons,
        str(str=configured) = "0" AS CachingDisabled,
        len(list=cache_entries) AS ActualCachedEntryCount,
        hive_info[0].OSPath AS SecurityHive,
        hive_info[0].Size AS SecurityHiveSize,
        hive_info[0].Mtime AS SecurityHiveMtime
      FROM scope()
