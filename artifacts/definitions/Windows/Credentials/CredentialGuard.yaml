name: Windows.Credentials.CredentialGuard
description: |
  Reports the Credential Guard / LSA protection posture of a Windows
  host.

  Credential Guard (a Virtualization-Based-Security feature, Windows
  10/11/Server 2016+) isolates LSASS secrets into a separate
  hypervisor-protected process so that even SYSTEM cannot read NT
  hashes, Kerberos tickets, or other LSA secrets out of LSASS memory.
  If Credential Guard is enabled, classic LSASS-credential-dumping
  attacks (Mimikatz `sekurlsa::*`, comsvcs.dll MiniDump, etc.) cannot
  recover plaintext or hashes from the protected store.

  LSA Protection (RunAsPPL) is the simpler precursor: it marks lsass
  as a Protected Process Light so that non-PPL code cannot
  OpenProcess(VM_READ) it. Easier to bypass than Credential Guard but
  still a meaningful hurdle.

  Both are key inputs to a credential-compromise assessment because
  they directly tell you whether an attacker with SYSTEM on the host
  could have pulled cleartext / hash material from LSASS.

  Reported indicators (registry-based; works offline against a
  collected image as well as on a live host):

    - HKLM\SYSTEM\CurrentControlSet\Control\Lsa\LsaCfgFlags
        0 = CredentialGuard disabled
        1 = enabled with UEFI lock
        2 = enabled without lock
    - HKLM\SYSTEM\CurrentControlSet\Control\DeviceGuard
        EnableVirtualizationBasedSecurity (1 = VBS on)
        RequirePlatformSecurityFeatures   (1 = SecureBoot, 3 = +DMA)
        HypervisorEnforcedCodeIntegrity   (1 = HVCI on)
    - HKLM\SYSTEM\CurrentControlSet\Control\DeviceGuard\Scenarios\CredentialGuard
        Enabled (1 = configured to run)
    - HKLM\SYSTEM\CurrentControlSet\Control\Lsa\RunAsPPL
        1 = LSA Protection on
        2 = LSA Protection on with UEFI lock
    - HKLM\SYSTEM\CurrentControlSet\Control\Lsa\RunAsPPLBoot
        boot-time value

  Note: the most authoritative "is Credential Guard actively running
  right now" signal comes from
  `Win32_DeviceGuard.SecurityServicesRunning` (WMI) on a live host. The
  artifact queries WMI when available; on offline triage only the
  registry indicators are present.

author: "Claude - credential-compromise-detection"

reference:
  - https://learn.microsoft.com/en-us/windows/security/identity-protection/credential-guard/
  - https://learn.microsoft.com/en-us/windows-server/security/credentials-protection-and-management/configuring-additional-lsa-protection
  - https://attack.mitre.org/techniques/T1003/001/

precondition: SELECT OS From info() where OS = 'windows'

sources:
  - name: Posture
    query: |
      LET reg_val(path, value) = read_reg_value(path=path, value=value)

      LET lsa_cfg_flags = reg_val(
        path="HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\Lsa",
        value="LsaCfgFlags")
      LET run_as_ppl = reg_val(
        path="HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\Lsa",
        value="RunAsPPL")
      LET run_as_ppl_boot = reg_val(
        path="HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\Lsa",
        value="RunAsPPLBoot")
      LET vbs_enabled = reg_val(
        path="HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard",
        value="EnableVirtualizationBasedSecurity")
      LET vbs_platform = reg_val(
        path="HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard",
        value="RequirePlatformSecurityFeatures")
      LET hvci = reg_val(
        path="HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard",
        value="HypervisorEnforcedCodeIntegrity")
      LET cg_configured = reg_val(
        path="HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard\\Scenarios\\CredentialGuard",
        value="Enabled")

      -- Win32_DeviceGuard.SecurityServicesRunning is an array of ints:
      --   1 = CredentialGuard
      --   2 = HVCI
      --   3 = System Guard Secure Launch
      --   4 = SMM Firmware Measurement
      LET wmi_running = SELECT SecurityServicesRunning
        FROM wmi(query="SELECT SecurityServicesRunning FROM Win32_DeviceGuard",
                 namespace="root\\Microsoft\\Windows\\DeviceGuard")

      LET cg_running_live = if(
            condition=wmi_running[0].SecurityServicesRunning,
            then=1 in wmi_running[0].SecurityServicesRunning,
            else=FALSE)

      SELECT
        -- Credential Guard
        atoi(string=str(str=lsa_cfg_flags)) AS LsaCfgFlags,
        if(condition=str(str=lsa_cfg_flags) = "1",
           then="CredentialGuard enabled (UEFI lock)",
        else=if(condition=str(str=lsa_cfg_flags) = "2",
           then="CredentialGuard enabled (no lock)",
        else=if(condition=str(str=lsa_cfg_flags) = "0",
           then="CredentialGuard disabled",
           else="CredentialGuard not configured"))) AS CredentialGuardConfigured,
        cg_running_live AS CredentialGuardRunning,

        -- Underlying VBS plumbing
        atoi(string=str(str=vbs_enabled)) AS VBSEnabled,
        atoi(string=str(str=vbs_platform)) AS RequirePlatformSecurityFeatures,
        atoi(string=str(str=hvci)) AS HVCIEnabled,
        atoi(string=str(str=cg_configured)) AS CredentialGuardScenarioEnabled,

        -- LSA Protection (PPL)
        atoi(string=str(str=run_as_ppl)) AS RunAsPPL,
        atoi(string=str(str=run_as_ppl_boot)) AS RunAsPPLBoot,
        if(condition=str(str=run_as_ppl) = "1" OR str(str=run_as_ppl) = "2",
           then=TRUE, else=FALSE) AS LsaProtectionEnabled,

        -- Composite verdict for triage
        if(condition=cg_running_live,
           then="LSASS protected by Credential Guard",
        else=if(condition=str(str=run_as_ppl) = "1" OR str(str=run_as_ppl) = "2",
           then="LSASS protected by LSA Protection (PPL) only",
           else="LSASS unprotected - sekurlsa::* style dumping viable"))
          AS Verdict
      FROM scope()
