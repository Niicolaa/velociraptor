name: Windows.Credentials.LaZagne
description: |
  Optional companion artifact for `Windows.Credentials.Inventory`.

  Runs the LaZagne credential dumper for deep extraction (DPAPI-
  protected browser passwords, Wi-Fi PSKs, Outlook profiles, etc.).

  LaZagne is intentionally **not** declared as a `tools:`-block
  dependency because:

    - AlessandroZ's upstream stopped shipping precompiled binaries
      after v2.4.3, so there is no stable GitHub-releases URL.
    - Community builds vary and ship under different filenames.
    - LaZagne is detected as malware by most AV/EDR engines, so
      operators usually want explicit control over which build runs.

  Deployment workflow:

    1. Build (or download a trusted community build of) LaZagne.exe.
    2. Either place it on the endpoint and pass `LaZagnePath`, or
       upload it to the Velociraptor server via the GUI's
       Tools section (tool name `LaZagne`) and the artifact will
       fetch it via `Generic.Utils.FetchBinary`.

  Running this WILL trigger AV/EDR. That is the intended behaviour
  during a controlled incident-response triage.

author: "Claude - credential-compromise-detection"

reference:
  - https://github.com/AlessandroZ/LaZagne

precondition: SELECT OS From info() where OS = 'windows'

tools:
  - name: LaZagne

parameters:
  - name: LaZagnePath
    description: |
      Absolute path to a LaZagne binary already on the endpoint.
      If empty, the artifact tries `Generic.Utils.FetchBinary` for
      tool name `LaZagne` (upload it to the server first).

implied_permissions:
  - EXECVE
  - FILESYSTEM_WRITE

sources:
  - name: Findings
    query: |
      LET bin_path = if(condition=LaZagnePath,
        then=LaZagnePath,
        else={ SELECT OSPath FROM Artifact.Generic.Utils.FetchBinary(
                   ToolName="LaZagne") })

      LET resolved = SELECT
        if(condition=type(item=bin_path) = "string",
           then=bin_path,
           else=bin_path[0].OSPath) AS BinPath
      FROM scope()
      WHERE BinPath

      LET raw = SELECT * FROM foreach(row=resolved, query={
        SELECT Stdout, ReturnCode
        FROM execve(argv=[BinPath, "all", "-oJ"], length=200000000)
      })

      SELECT
        get(field="Category") AS Category,
        get(field="passwords") AS Passwords,
        Stdout AS RawStdout,
        ReturnCode
      FROM raw
