name: Windows.Credentials.Inventory
description: |
  Enumerates credential stores present on a Windows host so an incident
  responder can quantify the credential-compromise blast radius after a
  host is suspected breached.

  The artifact is built for *triage by count*: each row identifies a
  store, where it lives, which user it belongs to, and whether a
  plaintext value would be recoverable in the current execution context
  (the `PlaintextAvailable` flag). It does **not** extract plaintext by
  default - run with `Extract=true` to also dump values that VQL can
  reach without external tooling, and with `RunLaZagne=true` to delegate
  to the LaZagne binary for everything else.

  Credential sources covered natively (no external tool):

    - Credential Manager entries           (`cmdkey /list`)
    - Saved Wi-Fi profiles + PSKs           (`netsh wlan show profiles`)
    - PuTTY saved sessions / host keys      (registry)
    - Stored RDP targets                    (HKCU Terminal Server Client)
    - Browser login databases (Chrome / Edge / Brave / Vivaldi / Opera /
      Firefox) - presence + row counts via SQLite
    - OpenSSH key files                     (`%USERPROFILE%\.ssh`)
    - Cloud CLI credential files            (.aws, .azure, gcloud)
    - Git credentials                       (.git-credentials, .gitconfig)
    - .netrc                                (file presence)
    - KeePass databases                     (*.kdbx)
    - GPG keyring                           (gnupg directory)
    - DPAPI master key directories          (signals decryptability)
    - SAM / SECURITY hive presence          (no hash extraction here -
                                              use Windows.Forensics.SAM)

  Optional `RunLaZagne=true` downloads the LaZagne binary via
  `Generic.Utils.FetchBinary` (tool name `LaZagne`) and parses its JSON
  output. NOTE: LaZagne is flagged as malware by most AV/EDR engines
  exactly because it dumps plaintext credentials. Running it on a
  production endpoint will almost certainly trigger defences - this is
  intentional and documented behaviour, mirroring the precedent set by
  `Windows.Applications.NirsoftBrowserViewer`.

author: "Claude - credential-compromise-detection"

reference:
  - https://github.com/AlessandroZ/LaZagne
  - https://attack.mitre.org/techniques/T1555/

precondition: SELECT OS From info() where OS = 'windows'

tools:
  - name: LaZagne
    url: https://github.com/AlessandroZ/LaZagne/releases/download/2.4.6/LaZagne.exe
    serve_locally: true

parameters:
  - name: Extract
    type: bool
    description: |
      If true, attempt to extract plaintext values from natively
      reachable stores (Wi-Fi PSKs via `key=clear`, etc.). Off by
      default to minimise plaintext in the datastore.
  - name: RunLaZagne
    type: bool
    description: |
      If true, fetch and run the LaZagne binary. Will trigger AV/EDR.
  - name: TargetUsersGlob
    description: User profile glob to scan for per-user stores.
    default: 'C:/Users/*'

sources:
  - name: CredentialManager
    query: |
      LET output = SELECT * FROM execve(argv=["cmdkey", "/list"])
      SELECT "CredentialManager" AS CredentialType,
             "cmdkey" AS Source,
             "Windows Credential Manager" AS Location,
             NULL AS User,
             dict(Stdout=Stdout, ReturnCode=ReturnCode) AS MetaData,
             Extract AS PlaintextAvailable
      FROM output
      WHERE ReturnCode = 0

  - name: WifiProfiles
    query: |
      LET list_out = SELECT Stdout FROM execve(argv=["netsh", "wlan", "show", "profiles"])
      LET profiles = SELECT Match.Profile AS ProfileName FROM parse_records_with_regex(
            accessor='data',
            file=list_out[0].Stdout,
            regex='All User Profile\\s*:\\s(?P<Profile>[^\\r\\n]+)')

      LET enriched = SELECT ProfileName,
            if(condition=Extract,
               then={ SELECT Stdout FROM execve(argv=[
                          "netsh", "wlan", "show", "profile",
                          "name=" + ProfileName, "key=clear"]) },
               else={ SELECT Stdout FROM execve(argv=[
                          "netsh", "wlan", "show", "profile",
                          "name=" + ProfileName]) }) AS Details
      FROM profiles

      SELECT "WifiProfile" AS CredentialType,
             "netsh wlan" AS Source,
             ProfileName AS Location,
             NULL AS User,
             dict(ProfileName=ProfileName,
                  Details=Details[0].Stdout) AS MetaData,
             Extract AS PlaintextAvailable
      FROM enriched

  - name: PuttySessions
    query: |
      LET sessions = SELECT FullPath, Mtime,
                            read_reg_value(path=FullPath, value="HostName") AS HostName,
                            read_reg_value(path=FullPath, value="UserName") AS UserName,
                            read_reg_value(path=FullPath, value="PortNumber") AS PortNumber
        FROM glob(globs="HKEY_USERS\\*\\Software\\SimonTatham\\PuTTY\\Sessions\\*",
                  accessor="registry")

      SELECT "PuttySession" AS CredentialType,
             "PuTTY" AS Source,
             FullPath AS Location,
             UserName AS User,
             dict(HostName=HostName, PortNumber=PortNumber, Mtime=Mtime) AS MetaData,
             false AS PlaintextAvailable
      FROM sessions
      WHERE HostName

  - name: PuttyHostKeys
    query: |
      SELECT "PuttyHostKey" AS CredentialType,
             "PuTTY" AS Source,
             FullPath AS Location,
             NULL AS User,
             dict(KeyName=Name, Mtime=Mtime) AS MetaData,
             false AS PlaintextAvailable
      FROM glob(globs="HKEY_USERS\\*\\Software\\SimonTatham\\PuTTY\\SshHostKeys\\*",
                accessor="registry")

  - name: RDPSavedTargets
    query: |
      SELECT "RDPSavedTarget" AS CredentialType,
             "Terminal Server Client" AS Source,
             FullPath AS Location,
             NULL AS User,
             dict(Server=Name,
                  UsernameHint=read_reg_value(path=FullPath, value="UsernameHint"),
                  Mtime=Mtime) AS MetaData,
             false AS PlaintextAvailable
      FROM glob(globs="HKEY_USERS\\*\\Software\\Microsoft\\Terminal Server Client\\Servers\\*",
                accessor="registry")

  - name: BrowserLogins
    query: |
      LET browser_globs = (
        dict(Browser='Chrome',
             Glob=TargetUsersGlob + '/AppData/Local/Google/Chrome/User Data/*/Login Data'),
        dict(Browser='Edge',
             Glob=TargetUsersGlob + '/AppData/Local/Microsoft/Edge/User Data/*/Login Data'),
        dict(Browser='Brave',
             Glob=TargetUsersGlob + '/AppData/Local/BraveSoftware/Brave-Browser/User Data/*/Login Data'),
        dict(Browser='Vivaldi',
             Glob=TargetUsersGlob + '/AppData/Local/Vivaldi/User Data/*/Login Data'),
        dict(Browser='Opera',
             Glob=TargetUsersGlob + '/AppData/Roaming/Opera Software/Opera Stable/Login Data'),
        dict(Browser='Firefox',
             Glob=TargetUsersGlob + '/AppData/Roaming/Mozilla/Firefox/Profiles/*/logins.json')
      )

      LET found = SELECT * FROM foreach(row=browser_globs, query={
        SELECT Browser, OSPath, Mtime
        FROM glob(globs=Glob)
      })

      LET counted = SELECT Browser, OSPath, Mtime,
            if(condition=Browser != 'Firefox',
               then={ SELECT count() AS C FROM sqlite(
                          file=OSPath, query='SELECT origin_url FROM logins') },
               else={ SELECT len(list=parse_json(data=read_file(filename=OSPath)).logins) AS C
                      FROM scope() }) AS CountResult
      FROM found

      SELECT "BrowserLogin" AS CredentialType,
             Browser AS Source,
             OSPath AS Location,
             regex_replace(source=str(str=OSPath),
                           re='.*[\\\\/]Users[\\\\/]([^\\\\/]+).*',
                           replace='$1') AS User,
             dict(EntryCount=CountResult[0].C, Mtime=Mtime) AS MetaData,
             Extract AS PlaintextAvailable
      FROM counted

  - name: OpenSSHKeys
    query: |
      SELECT "SSHPrivateKey" AS CredentialType,
             "OpenSSH" AS Source,
             OSPath AS Location,
             regex_replace(source=str(str=OSPath),
                           re='.*[\\\\/]Users[\\\\/]([^\\\\/]+).*',
                           replace='$1') AS User,
             dict(Size=Size, Mtime=Mtime,
                  Encrypted=read_file(filename=OSPath, length=200) =~ 'ENCRYPTED') AS MetaData,
             true AS PlaintextAvailable
      FROM glob(globs=TargetUsersGlob + '/.ssh/{id_rsa,id_dsa,id_ecdsa,id_ed25519,*.pem,*.key}')
      WHERE NOT IsDir

  - name: CloudCLICredentials
    query: |
      LET globs = (
        dict(Kind='AWSCLI',     Glob=TargetUsersGlob + '/.aws/credentials'),
        dict(Kind='AWSConfig',  Glob=TargetUsersGlob + '/.aws/config'),
        dict(Kind='AzureCLI',   Glob=TargetUsersGlob + '/.azure/accessTokens.json'),
        dict(Kind='AzureCLI',   Glob=TargetUsersGlob + '/.azure/msal_token_cache.json'),
        dict(Kind='GCloud',     Glob=TargetUsersGlob + '/AppData/Roaming/gcloud/credentials.db'),
        dict(Kind='Kubeconfig', Glob=TargetUsersGlob + '/.kube/config'),
        dict(Kind='Docker',     Glob=TargetUsersGlob + '/.docker/config.json')
      )
      SELECT * FROM foreach(row=globs, query={
        SELECT Kind AS CredentialType,
               "CloudCLI" AS Source,
               OSPath AS Location,
               regex_replace(source=str(str=OSPath),
                             re='.*[\\\\/]Users[\\\\/]([^\\\\/]+).*',
                             replace='$1') AS User,
               dict(Size=Size, Mtime=Mtime) AS MetaData,
               true AS PlaintextAvailable
        FROM glob(globs=Glob)
        WHERE NOT IsDir
      })

  - name: GitAndNetrc
    query: |
      SELECT * FROM foreach(row=[
        dict(Kind='GitCredentials', Glob=TargetUsersGlob + '/.git-credentials'),
        dict(Kind='Gitconfig',      Glob=TargetUsersGlob + '/.gitconfig'),
        dict(Kind='Netrc',          Glob=TargetUsersGlob + '/_netrc'),
        dict(Kind='Netrc',          Glob=TargetUsersGlob + '/.netrc')
      ], query={
        SELECT Kind AS CredentialType,
               "GitAndNetrc" AS Source,
               OSPath AS Location,
               regex_replace(source=str(str=OSPath),
                             re='.*[\\\\/]Users[\\\\/]([^\\\\/]+).*',
                             replace='$1') AS User,
               dict(Size=Size, Mtime=Mtime) AS MetaData,
               true AS PlaintextAvailable
        FROM glob(globs=Glob)
        WHERE NOT IsDir
      })

  - name: KeePassAndGPG
    query: |
      LET kdbx = SELECT "KeePassDatabase" AS CredentialType,
                        "KeePass" AS Source,
                        OSPath AS Location,
                        regex_replace(source=str(str=OSPath),
                                      re='.*[\\\\/]Users[\\\\/]([^\\\\/]+).*',
                                      replace='$1') AS User,
                        dict(Size=Size, Mtime=Mtime) AS MetaData,
                        false AS PlaintextAvailable
        FROM glob(globs=TargetUsersGlob + '/**/*.kdbx')
        WHERE NOT IsDir

      LET gpg = SELECT "GPGKeyring" AS CredentialType,
                       "GnuPG" AS Source,
                       OSPath AS Location,
                       regex_replace(source=str(str=OSPath),
                                     re='.*[\\\\/]Users[\\\\/]([^\\\\/]+).*',
                                     replace='$1') AS User,
                       dict(Size=Size, Mtime=Mtime) AS MetaData,
                       false AS PlaintextAvailable
        FROM glob(globs=TargetUsersGlob + '/AppData/Roaming/gnupg/private-keys-v1.d/*.key')
        WHERE NOT IsDir

      SELECT * FROM chain(a=kdbx, b=gpg)

  - name: DPAPIMasterKeys
    query: |
      SELECT "DPAPIMasterKey" AS CredentialType,
             "DPAPI" AS Source,
             OSPath AS Location,
             regex_replace(source=str(str=OSPath),
                           re='.*[\\\\/]Users[\\\\/]([^\\\\/]+).*',
                           replace='$1') AS User,
             dict(Size=Size, Mtime=Mtime) AS MetaData,
             false AS PlaintextAvailable
      FROM glob(globs=TargetUsersGlob + '/AppData/Roaming/Microsoft/Protect/S-*/[0-9a-fA-F]*')
      WHERE NOT IsDir

  - name: SAMHivePresence
    query: |
      SELECT "RegistryHive" AS CredentialType,
             "SAM/SECURITY" AS Source,
             OSPath AS Location,
             NULL AS User,
             dict(Size=Size, Mtime=Mtime,
                  Note="Use Windows.Forensics.SAM for parsing") AS MetaData,
             false AS PlaintextAvailable
      FROM glob(globs=["C:/Windows/System32/config/SAM", "C:/Windows/System32/config/SECURITY"])

  - name: LaZagne
    query: |
      LET bin = SELECT OSPath AS BinPath
        FROM Artifact.Generic.Utils.FetchBinary(ToolName="LaZagne")
        WHERE RunLaZagne

      LET raw = SELECT Stdout, ReturnCode
        FROM foreach(row=bin, query={
          SELECT *
          FROM execve(argv=[BinPath, "all", "-oJ", "-output", "."], length=50000000)
        })

      LET parsed = SELECT * FROM foreach(row=raw, query={
        SELECT * FROM parse_json_array(data=Stdout)
      })

      SELECT "LaZagne" AS CredentialType,
             get(field="Category") AS Source,
             get(field="passwords") AS Location,
             NULL AS User,
             get(field="passwords") AS MetaData,
             true AS PlaintextAvailable
      FROM parsed
