name: Windows.Packs.CompromiseAssessment
description: |
  Triage pack for credential-compromise assessment on a Windows host.

  Bundles three sub-artifacts with safe defaults:

    1. `Windows.Credentials.Inventory`       - what credential stores
                                                 exist on this host
                                                 (count + locate, no
                                                 plaintext extraction)
    2. `Windows.Credentials.CachedLogons`    - configured + actual
                                                 cached-domain-credential
                                                 count (MSCacheV2)
    3. `Windows.Credentials.CredentialGuard` - CredentialGuard / LSA
                                                 Protection posture
                                                 (tells you if LSASS
                                                 dumping was viable)
    4. `Windows.EventLogs.InteractiveLogonHistory`
                                              - which users have logged
                                                 in interactively (i.e.
                                                 whose credentials were
                                                 present on this host,
                                                 LogonType 3 excluded)
    5. `Generic.Detection.SecretScanner`     - TruffleHog filesystem
                                                 scan with --no-verification
    6. `Windows.Triage.Seatbelt` (opt-in)     - GhostPack/Seatbelt
                                                 host-enumeration to
                                                 reconstruct which
                                                 privesc primitives
                                                 existed at time of
                                                 compromise. Off by
                                                 default - will trigger
                                                 AV/EDR.

  Defaults are conservative:
    - no LaZagne (`RunLaZagne=false`, needs a binary supplied)
    - no Seatbelt (`RunSeatbelt=false`)
    - no plaintext extraction (`Extract=false`)
    - no TruffleHog verification (`Verify=false`)
    - logon window: last 90 days

precondition: SELECT OS From info() where OS = 'windows'

parameters:
  - name: LogonHistoryDays
    type: int64
    default: 90
  - name: RunLaZagne
    type: bool
  - name: RunSeatbelt
    type: bool
  - name: Extract
    type: bool
  - name: Upload
    type: bool
    description: Upload located credential files (e.g. ~/.ssh/known_hosts).
  - name: Verify
    type: bool
  - name: SecretScanPaths
    default: 'C:/Users'

sources:
  - name: CredentialInventory
    query: |
      SELECT * FROM Artifact.Windows.Credentials.Inventory(
        Extract=Extract,
        Upload=Upload)

  - name: LaZagneFindings
    query: |
      SELECT * FROM if(condition=RunLaZagne,
        then={ SELECT * FROM Artifact.Windows.Credentials.LaZagne() })

  - name: CachedLogons
    query: |
      SELECT * FROM Artifact.Windows.Credentials.CachedLogons()

  - name: CredentialGuardPosture
    query: |
      SELECT * FROM Artifact.Windows.Credentials.CredentialGuard()

  - name: LogonEvents
    query: |
      SELECT * FROM Artifact.Windows.EventLogs.InteractiveLogonHistory(
        DateAfter=timestamp(epoch=now() - LogonHistoryDays * 86400),
        source="LogonEvents")

  - name: LogonPerUserSummary
    query: |
      SELECT * FROM Artifact.Windows.EventLogs.InteractiveLogonHistory(
        DateAfter=timestamp(epoch=now() - LogonHistoryDays * 86400),
        source="PerUserSummary")

  - name: SecretFindings
    query: |
      SELECT * FROM Artifact.Generic.Detection.SecretScanner(
        ScanPaths=SecretScanPaths,
        Verify=Verify)

  - name: SeatbeltFindings
    query: |
      SELECT * FROM if(condition=RunSeatbelt,
        then={ SELECT * FROM Artifact.Windows.Triage.Seatbelt() })
