name: Linux.Credentials.LaZagne
description: |
  Optional companion artifact for `Linux.Credentials.Inventory`.

  Runs LaZagne in its Linux mode for deeper credential extraction
  (browsers, wallets, keyrings). LaZagne is **not** declared as an
  auto-downloaded tool because AlessandroZ's upstream does not ship
  a stable Linux binary URL; operators must build / supply their own.

  Deployment workflow: place the LaZagne binary on the endpoint and
  pass `LaZagnePath`, or upload it to the Velociraptor server under
  tool name `LaZagneLinux` and the artifact will fetch it.

author: "Claude - credential-compromise-detection"

precondition: SELECT OS From info() where OS = 'linux'

tools:
  - name: LaZagneLinux

parameters:
  - name: LaZagnePath
    description: Absolute path to a LaZagne binary already on the endpoint.

implied_permissions:
  - EXECVE
  - FILESYSTEM_WRITE

sources:
  - name: Findings
    query: |
      LET bin_path = if(condition=LaZagnePath,
        then=LaZagnePath,
        else={ SELECT OSPath FROM Artifact.Generic.Utils.FetchBinary(
                   ToolName="LaZagneLinux") })

      LET resolved = SELECT
        if(condition=type(item=bin_path) = "string",
           then=bin_path,
           else=bin_path[0].OSPath) AS BinPath
      FROM scope()
      WHERE BinPath

      LET raw = SELECT * FROM foreach(row=resolved, query={
        SELECT Stdout, ReturnCode
        FROM execve(argv=[BinPath, "all", "-oJ"], length=200000000)
      })

      SELECT Stdout AS RawStdout, ReturnCode FROM raw
