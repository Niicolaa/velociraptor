name: Linux.Credentials.Inventory
description: |
  Enumerates credential stores present on a Linux host so an incident
  responder can size the credential-compromise blast radius after the
  host is suspected breached.

  Default mode: count + locate, no plaintext extraction.

  Sources covered natively:

    - SSH key files                       (~/.ssh, /etc/ssh)
    - Cloud CLI credential files          (.aws, .azure, gcloud,
                                            kubeconfig, docker)
    - Git credentials + .netrc
    - Browser login databases             (Chrome / Chromium /
                                            Firefox)
    - GNOME Keyring / KWallet presence
    - NetworkManager Wi-Fi profiles       (system-connections - PSKs
                                            live here in plaintext)
    - `/etc/shadow` hash inventory        (hash type + user count only)
    - GPG keyring presence

  For deeper extraction call the separate `Linux.Credentials.LaZagne`
  artifact - it is split out because no community-trusted host serves
  a stable LaZagne build, so the binary URL must be supplied per
  deployment.

author: "Claude - credential-compromise-detection"

reference:
  - https://github.com/AlessandroZ/LaZagne
  - https://attack.mitre.org/techniques/T1552/

precondition: SELECT OS From info() where OS = 'linux'

parameters:
  - name: Extract
    type: bool
  - name: Upload
    type: bool
    description: |
      If true, upload each located credential file (the whole file,
      not just metadata) into the collection so a responder can
      inspect them. Especially useful for ~/.ssh/known_hosts and
      authorized_keys (lateral-pivot graph) and for the cloud-CLI
      config files.
  - name: HomeGlob
    default: '/home/*'
  - name: AlsoRoot
    type: bool
    default: true

sources:
  - name: SSHKeys
    query: |
      LET roots = SELECT Glob FROM chain(
        a={ SELECT HomeGlob + '/.ssh' AS Glob FROM scope() },
        b={ SELECT '/root/.ssh' AS Glob FROM scope() WHERE AlsoRoot },
        c={ SELECT '/etc/ssh' AS Glob FROM scope() })

      SELECT * FROM foreach(row=roots, query={
        SELECT "SSHKey" AS CredentialType,
               "OpenSSH" AS Source,
               OSPath AS Location,
               regex_replace(source=str(str=OSPath),
                             re='/home/([^/]+)/.*',
                             replace='$1') AS User,
               dict(Size=Size, Mtime=Mtime,
                    Encrypted=read_file(filename=OSPath, length=200) =~ 'ENCRYPTED') AS MetaData,
               true AS PlaintextAvailable,
               if(condition=Upload, then=upload(file=OSPath)) AS UploadInfo
        FROM glob(globs=Glob + '/{id_rsa,id_dsa,id_ecdsa,id_ed25519,*.pem,*.key,authorized_keys,known_hosts}')
        WHERE NOT IsDir
      })

  - name: CloudCLICredentials
    query: |
      LET globs = (
        dict(Kind='AWSCLI',     Glob=HomeGlob + '/.aws/credentials'),
        dict(Kind='AWSCLI',     Glob='/root/.aws/credentials'),
        dict(Kind='AWSConfig',  Glob=HomeGlob + '/.aws/config'),
        dict(Kind='AzureCLI',   Glob=HomeGlob + '/.azure/accessTokens.json'),
        dict(Kind='AzureCLI',   Glob=HomeGlob + '/.azure/msal_token_cache.json'),
        dict(Kind='GCloud',     Glob=HomeGlob + '/.config/gcloud/credentials.db'),
        dict(Kind='GCloud',     Glob=HomeGlob + '/.config/gcloud/legacy_credentials/*/adc.json'),
        dict(Kind='Kubeconfig', Glob=HomeGlob + '/.kube/config'),
        dict(Kind='Docker',     Glob=HomeGlob + '/.docker/config.json'),
        dict(Kind='Helm',       Glob=HomeGlob + '/.config/helm/repositories.yaml')
      )
      SELECT * FROM foreach(row=globs, query={
        SELECT Kind AS CredentialType,
               "CloudCLI" AS Source,
               OSPath AS Location,
               regex_replace(source=str(str=OSPath),
                             re='/home/([^/]+)/.*',
                             replace='$1') AS User,
               dict(Size=Size, Mtime=Mtime) AS MetaData,
               true AS PlaintextAvailable,
               if(condition=Upload, then=upload(file=OSPath)) AS UploadInfo
        FROM glob(globs=Glob)
        WHERE NOT IsDir
      })

  - name: GitAndNetrc
    query: |
      SELECT * FROM foreach(row=[
        dict(Kind='GitCredentials', Glob=HomeGlob + '/.git-credentials'),
        dict(Kind='Gitconfig',      Glob=HomeGlob + '/.gitconfig'),
        dict(Kind='Netrc',          Glob=HomeGlob + '/.netrc')
      ], query={
        SELECT Kind AS CredentialType,
               "GitAndNetrc" AS Source,
               OSPath AS Location,
               regex_replace(source=str(str=OSPath),
                             re='/home/([^/]+)/.*',
                             replace='$1') AS User,
               dict(Size=Size, Mtime=Mtime) AS MetaData,
               true AS PlaintextAvailable,
               if(condition=Upload, then=upload(file=OSPath)) AS UploadInfo
        FROM glob(globs=Glob)
        WHERE NOT IsDir
      })

  - name: BrowserLogins
    query: |
      LET globs = (
        dict(Browser='Chrome',
             Glob=HomeGlob + '/.config/google-chrome/*/Login Data'),
        dict(Browser='Chromium',
             Glob=HomeGlob + '/.config/chromium/*/Login Data'),
        dict(Browser='Firefox',
             Glob=HomeGlob + '/.mozilla/firefox/*/logins.json')
      )

      LET found = SELECT * FROM foreach(row=globs, query={
        SELECT Browser, OSPath, Mtime
        FROM glob(globs=Glob)
      })

      LET counted = SELECT Browser, OSPath, Mtime,
            if(condition=Browser != 'Firefox',
               then={ SELECT count() AS C FROM sqlite(
                          file=OSPath, query='SELECT origin_url FROM logins') },
               else={ SELECT len(list=parse_json(data=read_file(filename=OSPath)).logins) AS C
                      FROM scope() }) AS CountResult
      FROM found

      SELECT "BrowserLogin" AS CredentialType,
             Browser AS Source,
             OSPath AS Location,
             regex_replace(source=str(str=OSPath),
                           re='/home/([^/]+)/.*',
                           replace='$1') AS User,
             dict(EntryCount=CountResult[0].C, Mtime=Mtime) AS MetaData,
             Extract AS PlaintextAvailable,
             if(condition=Upload, then=upload(file=OSPath)) AS UploadInfo
      FROM counted

  - name: Keyrings
    query: |
      LET globs = (
        dict(Kind='GnomeKeyring', Glob=HomeGlob + '/.local/share/keyrings/*.keyring'),
        dict(Kind='KWallet',      Glob=HomeGlob + '/.local/share/kwalletd/*.kwl'),
        dict(Kind='GnuPG',        Glob=HomeGlob + '/.gnupg/private-keys-v1.d/*.key')
      )
      SELECT * FROM foreach(row=globs, query={
        SELECT Kind AS CredentialType,
               "Keyring" AS Source,
               OSPath AS Location,
               regex_replace(source=str(str=OSPath),
                             re='/home/([^/]+)/.*',
                             replace='$1') AS User,
               dict(Size=Size, Mtime=Mtime) AS MetaData,
               false AS PlaintextAvailable,
               if(condition=Upload, then=upload(file=OSPath)) AS UploadInfo
        FROM glob(globs=Glob)
        WHERE NOT IsDir
      })

  - name: WifiProfiles
    query: |
      SELECT "WifiProfile" AS CredentialType,
             "NetworkManager" AS Source,
             OSPath AS Location,
             NULL AS User,
             dict(Size=Size, Mtime=Mtime,
                  ContainsPSK=read_file(filename=OSPath) =~ 'psk=') AS MetaData,
             Extract AS PlaintextAvailable,
             if(condition=Upload, then=upload(file=OSPath)) AS UploadInfo
      FROM glob(globs='/etc/NetworkManager/system-connections/*')
      WHERE NOT IsDir

  - name: ShadowHashInventory
    query: |
      LET lines = SELECT * FROM parse_lines(filename='/etc/shadow')
      LET parsed = SELECT
            split(string=Line, sep=':')[0] AS Username,
            split(string=Line, sep=':')[1] AS Hash
        FROM lines
        WHERE Line =~ '^[^:]+:[^:!*]'

      LET classified = SELECT Username,
            if(condition=Hash =~ '^\\$6\\$', then='SHA512',
            else=if(condition=Hash =~ '^\\$5\\$', then='SHA256',
            else=if(condition=Hash =~ '^\\$2[aby]\\$', then='Bcrypt',
            else=if(condition=Hash =~ '^\\$y\\$', then='Yescrypt',
            else=if(condition=Hash =~ '^\\$1\\$', then='MD5',
            else='Other'))))) AS HashType
        FROM parsed

      SELECT "ShadowHash" AS CredentialType,
             "/etc/shadow" AS Source,
             Username AS Location,
             Username AS User,
             dict(HashType=HashType) AS MetaData,
             false AS PlaintextAvailable
      FROM classified
